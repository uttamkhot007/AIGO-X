kind = "web"
previewPath = "/grc-platform/"
title = "DuFense GRC Platform"
version = "1.0.0"
id = "artifacts/grc-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/grc-platform/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/grc-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grc-platform", "run", "build" ]
publicDir = "artifacts/grc-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8081"
BASE_PATH = "/grc-platform/"
