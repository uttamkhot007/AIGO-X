<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIGO-X Browser Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0e18;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #065f46 100%);
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white; flex-shrink: 0;
    }
    .header-text h1 { font-size: 13px; font-weight: 800; color: white; }
    .header-text p  { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .status-bar {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6b7280; flex-shrink: 0;
    }
    .status-dot.connected  { background: #10b981; box-shadow: 0 0 6px #10b98188; }
    .status-dot.offline    { background: #ef4444; }
    .status-dot.connecting { background: #f59e0b; }
    .status-label { font-size: 11px; font-weight: 700; }
    .status-label.connected  { color: #10b981; }
    .status-label.offline    { color: #ef4444; }
    .status-label.connecting { color: #f59e0b; }
    .status-left { display: flex; align-items: center; gap: 6px; }
    .version-pill {
      background: rgba(147,197,253,0.12); color: rgb(147,197,253);
      border: 1px solid rgba(147,197,253,0.25); border-radius: 10px;
      padding: 1px 8px; font-size: 10px; font-weight: 700;
    }
    .managed-pill {
      background: rgba(16,185,129,0.12); color: #10b981;
      border: 1px solid rgba(16,185,129,0.25); border-radius: 10px;
      padding: 1px 8px; font-size: 10px; font-weight: 700;
    }
    .body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    .row .label { font-size: 11px; color: rgba(255,255,255,0.45); }
    .row .value { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.85); font-family: monospace; }
    .divider { height: 1px; background: rgba(255,255,255,0.07); }
    .recent-title {
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35); margin-bottom: 6px;
    }
    .event-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .event-row:last-child { border-bottom: none; }
    .event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .event-name { font-size: 11px; color: rgba(255,255,255,0.8); flex: 1; }
    .event-type { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    .footer {
      padding: 10px 16px 14px;
      display: flex; gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .btn {
      flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit; border: none; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: rgba(147,197,253,0.15); color: rgb(147,197,253); border: 1px solid rgba(147,197,253,0.3) !important; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1) !important; }
    .not-configured { padding: 20px 16px; text-align: center; }
    .not-configured p { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 12px; }
    #queue-size { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">A</div>
  <div class="header-text">
    <h1>AIGO-X Browser Agent</h1>
    <p id="header-sub">Loading status…</p>
  </div>
</div>

<div class="status-bar">
  <div class="status-left">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Checking…</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <span class="version-pill" id="version-pill">v—</span>
    <span class="managed-pill" id="managed-pill" style="display:none">🔒 Managed</span>
  </div>
</div>

<div id="body-configured" class="body" style="display:none">
  <div class="row">
    <span class="label">Agent ID</span>
    <span class="value" id="agent-id">—</span>
  </div>
  <div class="row">
    <span class="label">Last heartbeat</span>
    <span class="value" id="last-heartbeat">—</span>
  </div>
  <div class="row">
    <span class="label">Browser</span>
    <span class="value" id="browser-name">—</span>
  </div>
  <div class="row">
    <span class="label">Events pending</span>
    <span class="value" id="queue-size">0</span>
  </div>

  <div class="divider"></div>

  <div>
    <div class="recent-title">Recent Detections</div>
    <div id="recent-events">
      <div style="font-size:11px;color:rgba(255,255,255,0.3);padding:4px 0">No events yet this session</div>
    </div>
  </div>
</div>

<div id="body-not-configured" class="not-configured" style="display:none">
  <p>This extension is not yet enrolled.<br/>Open Settings to connect it to your AIGO-X platform.</p>
</div>

<div class="footer">
  <button class="btn btn-primary" id="btn-flush">↑ Flush Events</button>
  <button class="btn btn-secondary" id="btn-settings">⚙ Settings</button>
</div>

<script src="popup.js"></script>
</body>
</html>
