# DuFense AIGO-X GRC Platform — Hybrid Deployment
# ─────────────────────────────────────────────────────────────────────────────
# Core compliance/risk/auth services run on-premises.
# AI and integration services point to cloud endpoints via env vars.
#
# Usage:
#   export AI_SERVICE_URL=https://ai.acme.cloud
#   export INTEGRATION_SERVICE_URL=https://integrations.acme.cloud
#   docker compose -f deploy/docker-compose.hybrid.yml up -d
#
# To override cloud URLs at runtime:
#   docker compose -f deploy/docker-compose.hybrid.yml \
#     -e AI_SERVICE_URL=https://ai.acme.cloud \
#     -e INTEGRATION_SERVICE_URL=https://integrations.acme.cloud \
#     up -d

version: '3.9'

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
  NODE_ENV: production

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - internal
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Infrastructure (always on-prem) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dufense_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dufense_grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc_user} -d ${POSTGRES_DB:-dufense_grc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: dufense_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── On-Premises Core Services ────────────────────────────────────────────────
  # auth, risk, compliance, governance, privacy, evidence, secops run locally.
  # Regulated data never leaves the on-prem boundary.

  auth-service:
    image: dufense/auth-service:${APP_VERSION:-1.0.0}
    container_name: dufense_auth
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  risk-service:
    image: dufense/risk-service:${APP_VERSION:-1.0.0}
    container_name: dufense_risk
    build:
      context: ..
      dockerfile: services/risk-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  compliance-service:
    image: dufense/compliance-service:${APP_VERSION:-1.0.0}
    container_name: dufense_compliance
    build:
      context: ..
      dockerfile: services/compliance-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8003
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  governance-service:
    image: dufense/governance-service:${APP_VERSION:-1.0.0}
    container_name: dufense_governance
    build:
      context: ..
      dockerfile: services/governance-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  privacy-service:
    image: dufense/privacy-service:${APP_VERSION:-1.0.0}
    container_name: dufense_privacy
    build:
      context: ..
      dockerfile: services/privacy-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  evidence-service:
    image: dufense/evidence-service:${APP_VERSION:-1.0.0}
    container_name: dufense_evidence
    build:
      context: ..
      dockerfile: services/evidence-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8006
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8006/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  secops-service:
    image: dufense/secops-service:${APP_VERSION:-1.0.0}
    container_name: dufense_secops
    build:
      context: ..
      dockerfile: services/secops-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8007
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8007/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  trust-service:
    image: dufense/trust-service:${APP_VERSION:-1.0.0}
    container_name: dufense_trust
    build:
      context: ..
      dockerfile: services/trust-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8009
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8009/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  # ── API Gateway (on-prem, routes to cloud for AI + integrations) ─────────────
  gateway:
    image: dufense/gateway:${APP_VERSION:-1.0.0}
    container_name: dufense_gateway
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      <<: *common-env
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8001
      RISK_SERVICE_URL: http://risk-service:8002
      COMPLIANCE_SERVICE_URL: http://compliance-service:8003
      GOVERNANCE_SERVICE_URL: http://governance-service:8004
      PRIVACY_SERVICE_URL: http://privacy-service:8005
      EVIDENCE_SERVICE_URL: http://evidence-service:8006
      SECOPS_SERVICE_URL: http://secops-service:8007
      # ── Cloud-hosted services (set these to your cloud endpoints) ────────────
      # AI service processes unregulated workloads; does NOT receive PII/PCI data.
      # Integration service bridges third-party SaaS connectors from the cloud.
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8008}
      INTEGRATION_SERVICE_URL: ${INTEGRATION_SERVICE_URL:-http://integration-service:8010}
      TRUST_SERVICE_URL: http://trust-service:8009
      DEPLOYMENT_TYPE: hybrid
      TENANT_MODE: ${TENANT_MODE:-multi}
      # Bearer token for gateway → cloud service auth (shared secret or OIDC)
      CLOUD_SERVICE_TOKEN: ${CLOUD_SERVICE_TOKEN:-}
    depends_on:
      auth-service:
        condition: service_healthy
      risk-service:
        condition: service_healthy
      compliance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - internal
      # Needs internet egress to reach cloud AI / integration services
      - external

  # ── Web Frontend ──────────────────────────────────────────────────────────────
  web:
    image: dufense/grc-platform:${APP_VERSION:-1.0.0}
    container_name: dufense_web
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dufense_nginx
    ports:
      # Default: port 80 (HTTP). Change to "${WEB_PORT:-443}:443" when TLS
      # certificates are placed in nginx/ssl/ and ssl.conf is enabled.
      - "${WEB_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ../nginx/security.conf:/etc/nginx/conf.d/security.conf:ro
      # ssl.conf is mounted (but not included in nginx.conf by default).
      # Uncomment the include line in nginx.conf and place certs in nginx/ssl/
      # to enable TLS without rebuilding the container.
      - ../nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - gateway
    restart: unless-stopped
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    internal: true
  external:
    name: dufense_external
