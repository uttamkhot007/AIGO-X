# DuFense AIGO-X GRC Platform — Single-Tenant On-Premises
# One organisation, dedicated instance
# Usage: docker compose -f docker-compose.single.yml up -d

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dufense_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dufense_grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc_user} -d ${POSTGRES_DB:-dufense_grc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  api:
    image: dufense/api-server:${APP_VERSION:-1.0.0}
    container_name: dufense_api
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEPLOYMENT_TYPE: onprem
      TENANT_MODE: single
      ORG_NAME: ${ORG_NAME:-My Organisation}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      NODE_ENV: production
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  web:
    image: dufense/grc-platform:${APP_VERSION:-1.0.0}
    container_name: dufense_web
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: dufense_nginx
    ports:
      - "${WEB_PORT:-443}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    internal: true
  external:
    name: dufense_external
