# DuFense AIGO-X GRC Platform — Multi-Tenant On-Premises (Microservices)
# 10 domain services + API gateway + web + postgres + redis
# Usage: docker compose -f docker-compose.multi.yml up -d

version: '3.9'

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
  NODE_ENV: production

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - internal
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dufense_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dufense_grc}
      POSTGRES_USER: ${POSTGRES_USER:-grc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grc_user} -d ${POSTGRES_DB:-dufense_grc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: dufense_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # ── Domain Microservices ──────────────────────────────────────────────────────
  auth-service:
    image: dufense/auth-service:${APP_VERSION:-1.0.0}
    container_name: dufense_auth
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  risk-service:
    image: dufense/risk-service:${APP_VERSION:-1.0.0}
    container_name: dufense_risk
    build:
      context: ..
      dockerfile: services/risk-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  compliance-service:
    image: dufense/compliance-service:${APP_VERSION:-1.0.0}
    container_name: dufense_compliance
    build:
      context: ..
      dockerfile: services/compliance-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8003
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  governance-service:
    image: dufense/governance-service:${APP_VERSION:-1.0.0}
    container_name: dufense_governance
    build:
      context: ..
      dockerfile: services/governance-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  privacy-service:
    image: dufense/privacy-service:${APP_VERSION:-1.0.0}
    container_name: dufense_privacy
    build:
      context: ..
      dockerfile: services/privacy-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  evidence-service:
    image: dufense/evidence-service:${APP_VERSION:-1.0.0}
    container_name: dufense_evidence
    build:
      context: ..
      dockerfile: services/evidence-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8006
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8006/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  secops-service:
    image: dufense/secops-service:${APP_VERSION:-1.0.0}
    container_name: dufense_secops
    build:
      context: ..
      dockerfile: services/secops-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8007
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8007/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  ai-service:
    image: dufense/ai-service:${APP_VERSION:-1.0.0}
    container_name: dufense_ai
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8008
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8008/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  trust-service:
    image: dufense/trust-service:${APP_VERSION:-1.0.0}
    container_name: dufense_trust
    build:
      context: ..
      dockerfile: services/trust-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8009
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8009/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  integration-service:
    image: dufense/integration-service:${APP_VERSION:-1.0.0}
    container_name: dufense_integration
    build:
      context: ..
      dockerfile: services/integration-service/Dockerfile
    environment:
      <<: *common-env
      PORT: 8010
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8010/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    <<: *service-defaults

  # ── API Gateway ───────────────────────────────────────────────────────────────
  gateway:
    image: dufense/gateway:${APP_VERSION:-1.0.0}
    container_name: dufense_gateway
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      <<: *common-env
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8001
      RISK_SERVICE_URL: http://risk-service:8002
      COMPLIANCE_SERVICE_URL: http://compliance-service:8003
      GOVERNANCE_SERVICE_URL: http://governance-service:8004
      PRIVACY_SERVICE_URL: http://privacy-service:8005
      EVIDENCE_SERVICE_URL: http://evidence-service:8006
      SECOPS_SERVICE_URL: http://secops-service:8007
      AI_SERVICE_URL: http://ai-service:8008
      TRUST_SERVICE_URL: http://trust-service:8009
      INTEGRATION_SERVICE_URL: http://integration-service:8010
      DEPLOYMENT_TYPE: ${DEPLOYMENT_TYPE:-onprem}
      TENANT_MODE: ${TENANT_MODE:-multi}
    depends_on:
      auth-service:
        condition: service_healthy
      risk-service:
        condition: service_healthy
      compliance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  # ── Web Frontend ──────────────────────────────────────────────────────────────
  web:
    image: dufense/grc-platform:${APP_VERSION:-1.0.0}
    container_name: dufense_web
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dufense_nginx
    ports:
      - "${WEB_PORT:-443}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - gateway
    restart: unless-stopped
    networks:
      - internal
      - external

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    internal: true
  external:
    name: dufense_external
