server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend static files
    location /grc-platform/ {
        alias /usr/share/nginx/html/grc-platform/;
        try_files $uri $uri/ /grc-platform/index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # All API requests go to the gateway (which proxies to microservices)
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # SSE events need long-lived connections
        proxy_buffering off;
        proxy_cache off;
    }

    # Root redirect
    location = / {
        return 301 /grc-platform/;
    }

    # Health check endpoint for load balancer
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
