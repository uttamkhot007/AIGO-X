apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: aigo-x
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: aigo-x
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: dufense_grc
            - name: POSTGRES_USER
              value: grc_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aigo-x-secrets
                  key: POSTGRES_PASSWORD
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U grc_user -d dufense_grc"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "pg_isready -U grc_user -d dufense_grc"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
