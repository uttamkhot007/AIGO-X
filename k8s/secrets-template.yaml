# ── Secret template — DO NOT apply this file directly ─────────────────────────
# Use one of:
#   A) External Secrets Operator (recommended for production)
#   B) Sealed Secrets (GitOps-friendly)
#   C) Manual: kubectl create secret generic aigo-x-secrets \
#        --from-literal=DATABASE_URL="..." \
#        --from-literal=JWT_SECRET="..." \
#        --from-literal=REDIS_PASSWORD="..." \
#        --from-literal=POSTGRES_PASSWORD="..." \
#        --from-literal=TOKEN_ENCRYPTION_KEY="..." \
#        --from-literal=OPENAI_API_KEY="..." \
#        -n aigo-x
#
# NEVER commit actual secret values to git.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: aigo-x-secrets
  namespace: aigo-x
  annotations:
    # Prevent accidental overwrite during kubectl apply
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_ACTUAL_VALUE"
  JWT_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
  TOKEN_ENCRYPTION_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  OPENAI_API_KEY: ""
