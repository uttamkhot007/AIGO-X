# k8s/services/compliance-service/configmap.yaml
# Non-sensitive config. Sensitive values (DATABASE_URL, JWT_SECRET, etc.)
# must come from the Secret "aigo-x-secrets" (see k8s/secrets-template.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: compliance-service-config
  namespace: aigo-x
  labels:
    app.kubernetes.io/name: compliance-service
    app.kubernetes.io/part-of: aigo-x
data:
  NODE_ENV: "production"
  PORT: "8003"
  REDIS_URL: "redis://:CHANGEME@aigo-x-redis:6379"
