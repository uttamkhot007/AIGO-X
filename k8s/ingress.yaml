# Nginx Ingress — routes:
#   /api/* → gateway (port 8080)
#   /      → web    (port 80)
#
# Requirements: nginx-ingress-controller installed in the cluster.
# Install: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
#
# Replace HOST and TLS_SECRET_NAME before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aigo-x
  namespace: aigo-x
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # SSE (events endpoint) needs buffering disabled
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    # Rate limiting — override in overlays if needed
    nginx.ingress.kubernetes.io/limit-rps: "200"
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - HOST                    # replace with actual hostname
      secretName: TLS_SECRET_NAME # replace with TLS secret name
  rules:
    - host: HOST                  # replace with actual hostname
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
