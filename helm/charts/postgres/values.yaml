image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

auth:
  database: dufense_grc
  username: grc_user
  # password comes from aigo-x-secrets → POSTGRES_PASSWORD

persistence:
  enabled: true
  storageClass: ""     # uses cluster default
  size: 20Gi
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 5432

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

global:
  secretName: aigo-x-secrets
