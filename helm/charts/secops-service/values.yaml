replicaCount: 2

image:
  repository: dufense/secops-service
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8007

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

global:
  secretName: aigo-x-secrets
  nodeEnv: production
  redisUrl: "redis://:changeme@aigo-x-redis-master:6379"

extraEnv: []
configData: {}
