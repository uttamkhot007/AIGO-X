{{- if .Values.secrets.create }}
# NOTE: In production, manage secrets with an external secrets operator
# (e.g. External Secrets Operator + AWS Secrets Manager / HashiCorp Vault).
# This template is provided for initial bootstrap / CI only.
apiVersion: v1
kind: Secret
metadata:
  name: aigo-x-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: aigo-x
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL:          {{ .Values.secrets.databaseUrl | required "secrets.databaseUrl is required" | quote }}
  JWT_SECRET:            {{ .Values.secrets.jwtSecret | required "secrets.jwtSecret is required" | quote }}
  REDIS_PASSWORD:        {{ .Values.secrets.redisPassword | required "secrets.redisPassword is required" | quote }}
  POSTGRES_PASSWORD:     {{ .Values.secrets.postgresPassword | required "secrets.postgresPassword is required" | quote }}
  TOKEN_ENCRYPTION_KEY:  {{ .Values.secrets.tokenEncryptionKey | default "" | quote }}
  OPENAI_API_KEY:        {{ .Values.secrets.openaiApiKey | default "" | quote }}
{{- end }}
