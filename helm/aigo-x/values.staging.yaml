# ── Postgres / Redis — smaller for staging ─────────────────────────────────────
postgres:
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 75m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
