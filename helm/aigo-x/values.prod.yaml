# ── PostgreSQL — for production prefer a managed DB (RDS / Cloud SQL / Azure DB) ──
postgres:
  persistence:
    enabled: true
    size: 100Gi
    storageClass: "gp3"   # AWS EKS; change for AKS (managed-premium) / GKE (pd-ssd)
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi

# ── Redis ──────────────────────────────────────────────────────────────────────
