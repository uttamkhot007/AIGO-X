# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgres:
  auth:
    database: dufense_grc
    username: grc_user
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# ── Redis ──────────────────────────────────────────────────────────────────────
redis:
  persistence:
    enabled: true
    size: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
