apiVersion: v2
name: aigo-x
description: |
  AIGO-X GRC Platform — Umbrella Helm chart.
  Installs all 10 domain microservices, the API gateway, web frontend,
  PostgreSQL, and Redis as a single deployable unit.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - grc
  - compliance
  - risk-management
  - security
home: https://github.com/dufense/aigo-x
maintainers:
  - name: DuFense Engineering
    email: engineering@dufense.io
dependencies:
