# ─────────────────────────────────────────────────────────────────────────────
# DuFense AIGO-X GRC Platform — Nginx TLS / SSL Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Included by nginx/nginx.conf when TLS is enabled.
# Place certificates at:
#   /etc/nginx/ssl/fullchain.pem   (server cert + intermediates)
#   /etc/nginx/ssl/privkey.pem     (private key, 600 permissions)
#
# For Let's Encrypt: use Certbot and mount /etc/letsencrypt/live/<domain>/ here.
# For self-signed (air-gap): see scripts/gen-selfsigned-cert.sh

ssl_certificate         /etc/nginx/ssl/fullchain.pem;
ssl_certificate_key     /etc/nginx/ssl/privkey.pem;

# ── TLS protocol hardening ────────────────────────────────────────────────────
# TLS 1.2 minimum (required for PCI-DSS, HIPAA, ISO 27001 A.10.1.1).
# TLS 1.3 preferred for forward secrecy and 0-RTT performance.
ssl_protocols           TLSv1.2 TLSv1.3;
ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_prefer_server_ciphers off;

# ── Session cache and tickets ─────────────────────────────────────────────────
ssl_session_timeout     1d;
ssl_session_cache       shared:SSL:50m;
ssl_session_tickets     off;

# ── OCSP stapling ─────────────────────────────────────────────────────────────
# Reduces TLS handshake latency by pre-fetching revocation status.
ssl_stapling            on;
ssl_stapling_verify     on;
resolver                8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout        5s;

# ── DH parameters ─────────────────────────────────────────────────────────────
# Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 4096
# Uncomment once generated:
# ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ── HTTP Strict Transport Security (HSTS) ─────────────────────────────────────
# max-age=63072000 = 2 years. Only add preload once you are certain about HTTPS-only.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
