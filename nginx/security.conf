# ─────────────────────────────────────────────────────────────────────────────
# DuFense AIGO-X GRC Platform — Nginx Security Headers & Rate Limits
# ─────────────────────────────────────────────────────────────────────────────
# Included by the main server block in nginx/nginx.conf.
# Hardened for enterprise GRC / regulated environments (PCI-DSS, HIPAA, ISO 27001).

# ── Security headers ──────────────────────────────────────────────────────────

# Prevent the page from being framed by other origins (clickjacking protection)
add_header X-Frame-Options "SAMEORIGIN" always;

# Stop browsers from MIME-sniffing a response away from the declared content-type
add_header X-Content-Type-Options "nosniff" always;

# Legacy XSS filter (belt-and-suspenders for older browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Limit information sent in the Referer header
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy — disable unused browser APIs (camera, mic, geolocation)
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# Content Security Policy — restrict resource loading to trusted origins.
# Adjust 'connect-src' for your cloud AI / integration endpoint if using hybrid mode.
# 'unsafe-inline' on script-src is a temporary concession for React dev builds;
# replace with nonce- or hash-based CSP once the frontend build outputs nonces.
#
# NOTE: 'upgrade-insecure-requests' is intentionally omitted here.
# This file is included by the default HTTP (:80) server block for on-prem /
# air-gap deployments where TLS is not enabled.  That directive would cause
# browsers to rewrite HTTP requests to HTTPS, breaking all API calls and asset
# loads when no TLS listener is present.
# If you enable TLS (see the optional HTTPS block in nginx.conf), add
# 'upgrade-insecure-requests' to a separate TLS-only security header or to an
# additional add_header directive in the HTTPS server block only.
add_header Content-Security-Policy "
  default-src 'self';
  script-src  'self' 'unsafe-inline' 'unsafe-eval';
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    'self' https://fonts.gstatic.com data:;
  img-src     'self' data: blob: https:;
  connect-src 'self' wss: https:;
  frame-src   'none';
  object-src  'none';
  base-uri    'self';
  form-action 'self';
" always;

# Hide Nginx version from error pages and headers
server_tokens off;

# ── Request size limits ───────────────────────────────────────────────────────
# Prevent overly large bodies (DoS / injection vectors)
client_max_body_size    50m;
client_body_timeout     30s;
client_header_timeout   10s;

# ── Buffer hardening ──────────────────────────────────────────────────────────
# Small buffers mitigate certain buffer-overflow style attacks
client_body_buffer_size    16k;
client_header_buffer_size  1k;
large_client_header_buffers 4 8k;

# ── Rate limiting (zones defined in nginx.conf) ───────────────────────────────
# Applied per-location in nginx.conf; defined here as a reference.
# Zones:
#   api_limit    — 60 req/min per IP for /api/* (GRC API)
#   login_limit  — 10 req/min per IP for auth endpoints (brute-force protection)
#   global_limit — 200 req/min per IP overall
#   conn_limit   — 50 concurrent connections per IP
#
# Return 429 (Too Many Requests) on limit violation instead of default 503
limit_req_status  429;
limit_conn_status 429;
