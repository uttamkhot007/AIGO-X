# ─────────────────────────────────────────────────────────────────────────────
# DuFense AIGO-X GRC Platform — Nginx Upstream Service Map
# ─────────────────────────────────────────────────────────────────────────────
# Defines upstream groups for each microservice.
# Included by nginx/nginx.conf.
#
# In Docker Compose, service names resolve via the internal Docker DNS.
# In K8s, replace with ClusterIP service names (e.g. gateway.aigo-x.svc.cluster.local).
#
# For high-availability add multiple servers per upstream group and tune
# keepalive connections to reduce TCP overhead on hot paths.

# ── API Gateway (routes to all domain services) ───────────────────────────────
upstream gateway {
    server gateway:8080;
    keepalive 32;
}

# ── Web Frontend (nginx serving static SPA) ───────────────────────────────────
upstream web {
    server web:80;
    keepalive 16;
}

# ── Individual microservice upstreams ─────────────────────────────────────────
# Used when Nginx needs to bypass the gateway (e.g. health probes, admin routes).

upstream auth_service {
    server auth-service:8001;
    keepalive 8;
}

upstream risk_service {
    server risk-service:8002;
    keepalive 8;
}

upstream compliance_service {
    server compliance-service:8003;
    keepalive 8;
}

upstream governance_service {
    server governance-service:8004;
    keepalive 8;
}

upstream privacy_service {
    server privacy-service:8005;
    keepalive 8;
}

upstream evidence_service {
    server evidence-service:8006;
    keepalive 8;
}

upstream secops_service {
    server secops-service:8007;
    keepalive 8;
}

upstream ai_service {
    # Can be overridden by pointing to a cloud URL in hybrid deployments.
    # In fully on-prem mode this resolves to the local container.
    server ai-service:8008;
    keepalive 8;
}

upstream trust_service {
    server trust-service:8009;
    keepalive 8;
}

upstream integration_service {
    server integration-service:8010;
    keepalive 8;
}
