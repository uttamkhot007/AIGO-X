# ─────────────────────────────────────────────────────────────────────────────
# DuFense AIGO-X GRC Platform — Production Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Entry point. Include upstream.conf, security.conf, and ssl.conf as needed.
# In Docker Compose, mount this file at /etc/nginx/nginx.conf.
#
# To enable TLS: uncomment the ssl.conf include and the HTTPS server block,
# then place fullchain.pem + privkey.pem in ./ssl/.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Loaded from security.conf; defined here so all server blocks can use them.
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m  rate=200r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream service map ───────────────────────────────────────────────────
    include /etc/nginx/conf.d/upstream.conf;

    # ── HTTP server (default — serves content on port 80) ─────────────────────
    # For on-prem and air-gap environments, HTTP on port 80 is the default so
    # the platform is reachable immediately without certificates.
    #
    # To add TLS: populate nginx/ssl.conf with your certificate paths,
    # uncomment the HTTPS server block below, and change the Compose port
    # mapping to "${WEB_PORT:-443}:443".
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers — defined in security.conf
        include /etc/nginx/conf.d/security.conf;

        # Let's Encrypt ACME challenge (works even when redirecting to HTTPS later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── Rate limiting ─────────────────────────────────────────────────────
        limit_req zone=global_limit burst=50 nodelay;
        limit_conn conn_limit 50;

        # ── API gateway ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://gateway/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade      $http_upgrade;
            proxy_set_header Connection   "upgrade";
            proxy_set_header Host         $host;
            proxy_set_header X-Real-IP    $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;

            # SSE / WebSocket — disable buffering
            proxy_buffering off;
            proxy_cache off;
        }

        # Auth endpoints — stricter rate limit
        location ~ ^/api/(auth|login|logout|token) {
            limit_req zone=login_limit burst=5 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout 30s;
        }

        # ── Web frontend static assets ────────────────────────────────────────
        location / {
            proxy_pass http://web/;
            proxy_http_version 1.1;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout 30s;

            # Cache immutable assets aggressively
            location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                proxy_pass http://web;
            }
        }

        # Root redirect to app
        location = / {
            return 301 /grc-platform/;
        }

        # Health probe
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ── Optional HTTPS server (TLS termination) ────────────────────────────────
    # Uncomment and populate nginx/ssl.conf to enable TLS.
    # Also change Compose port mapping to "${WEB_PORT:-443}:443".
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name _;
    #
    #     include /etc/nginx/conf.d/ssl.conf;
    #     include /etc/nginx/conf.d/security.conf;
    #
    #     limit_req zone=global_limit burst=50 nodelay;
    #     limit_conn conn_limit 50;
    #
    #     location /api/ {
    #         limit_req zone=api_limit burst=20 nodelay;
    #         proxy_pass http://gateway/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 120s;
    #         proxy_buffering off;
    #     }
    #
    #     location / {
    #         proxy_pass http://web/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    #
    #     location = / { return 301 /grc-platform/; }
    #     location = /health { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }
    # }
}
